<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikash Pro Dashboard</title>
    <style>
        /* Body with your specific Gradient */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Glassmorphism Container */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 350px;
        }

        h2 {
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.5rem;
            color: #00f2fe;
            text-shadow: 0 0 10px #00f2fe;
        }

        /* Link Buttons Styling */
        .link-card {
            display: block;
            text-decoration: none;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.4s ease;
            position: relative;
            z-index: 1;
            overflow: hidden;
            border: 2px solid transparent;
        }

        /* Neon Glow Effect - Primary & Secondary Mix */
        .link-card {
            color: #00f2fe;
            border-color: #00f2fe;
            background: rgba(0, 242, 254, 0.05);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        /* Hover Animations */
        .link-card:hover {
            color: #fff;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            box-shadow: 0 0 20px #00f2fe, 0 0 40px #4facfe;
            transform: translateY(-5px) scale(1.05);
        }

        /* Background Animated Circles (Optional for Pro Look) */
        .bg-circle {
            position: absolute;
            z-index: -1;
            border-radius: 50%;
            background: linear-gradient(#00f2fe, #4facfe);
            filter: blur(80px);
            opacity: 0.3;
        }

        .circle-1 { width: 300px; height: 300px; top: -100px; right: -50px; }
        .circle-2 { width: 250px; height: 250px; bottom: -50px; left: -50px; }

    </style>
</head>
<body>

    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <div class="container">
        <h2>Truecaller Black </h2>

        <a href="https://vshack999.github.io/Truecaller-/" target="_blank" class="link-card">
            Truecaller Number info
        </a>

        <a href="https://vshack999.github.io/Vikash-sahu/" target="_blank" class="link-card">
            My website 
        </a>

        <a href="https://www.instagram.com/cg_vikash_sahu__07?igsh=MXV6ZjVuMTZxOHVudQ==" target="_blank" class="link-card">
            Instagram id
        </a>
    </div>

</body>
</html>
