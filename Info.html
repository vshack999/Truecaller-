<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Info - Dev Vikash Sahu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 { color: #00d2ff; font-size: 24px; margin-bottom: 10px; text-transform: uppercase; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #00ff88;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #00d2ff; box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }

        #resultBox {
            margin-top: 25px;
            background: #000;
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            border: 1px solid #333;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }

        pre { color: #00ff88; font-family: monospace; font-size: 13px; white-space: pre-wrap; }

        .dev-id {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
            letter-spacing: 1px;
        }

        .dev-id span { color: #00d2ff; font-weight: bold; }

        .loading { display: none; margin: 15px 0; color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TRACKER PRO</h1>
        <p>Enter mobile number to get details</p>

        <input type="number" id="numInput" placeholder="Enter Mobile (91xxxxxxxx)" />
        <button onclick="fetchData()">SEARCH INFO</button>

        <div id="loader" class="loading">Fetching Data...</div>

        <div id="resultBox">
            <pre id="output"></pre>
        </div>

        <div class="dev-id">
            DEVELOPED BY: <span>VIKASH SAHU</span>
        </div>
    </div>

    <script>
        async function fetchData() {
            const num = document.getElementById('numInput').value;
            const output = document.getElementById('output');
            const resultBox = document.getElementById('resultBox');
            const loader = document.getElementById('loader');

            if (!num) {
                alert("Please enter a number!");
                return;
            }

            loader.style.display = "block";
            resultBox.style.display = "none";

            // CORS fix ke liye proxy use kar rahe hain
            const proxy = "https://api.allorigins.win/get?url=";
            const apiUrl = encodeURIComponent(`https://exploits-api.site/anish/api.php?key=number&num=${num}`);

            try {
                const response = await fetch(proxy + apiUrl);
                const data = await response.json();
                
                loader.style.display = "none";
                resultBox.style.display = "block";
                
                // data.contents mein API ka asli response hoga
                output.innerText = data.contents;
                
            } catch (error) {
                loader.style.display = "none";
                alert("API Error! Possible CORS issue or invalid key.");
                console.error(error);
            }
        }
    </script>
</body>
</html>
