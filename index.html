<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIKASH SAHU | ADVANCED TERMINAL</title>
    <style>
        :root { 
            --primary: #00f2fe; 
            --secondary: #4facfe; 
            --accent: #ff0055;
            --bg: #050a0c; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            color: #fff;
        }

        /* --- BACKGROUND ANIMATION --- */
        body::before {
            content: "";
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0,242,254,0.05) 0%, transparent 70%);
            animation: rotateBg 20s linear infinite;
            z-index: -1;
        }
        @keyframes rotateBg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- HEADER --- */
        .header { 
            height: 80px; 
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: fixed; 
            top: 0; width: 100%; 
            z-index: 1500; 
        }
        .header h1 { 
            font-size: 28px; 
            letter-spacing: 6px; 
            color: var(--primary); 
            text-shadow: 0 0 15px var(--primary); 
            font-weight: 900;
        }

        /* --- DISCLAIMER MARQUEE --- */
        .disclaimer-bar {
            position: fixed;
            top: 80px;
            width: 100%;
            background: rgba(255, 0, 85, 0.15);
            border-bottom: 1px solid var(--accent);
            height: 30px;
            z-index: 1400;
            display: flex;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #ff0055;
            text-shadow: 0 0 5px #ff0055;
        }
        .marquee-text {
            white-space: nowrap;
            animation: marquee 25s linear infinite;
            padding-left: 100%;
            font-weight: bold;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* --- VIEWPORT (NO WHITE MASK) --- */
        .viewport { 
            position: absolute; 
            top: 110px; /* Header + Disclaimer height */
            bottom: 50px; 
            width: 100%; 
            overflow-y: auto; 
            background: transparent; /* सफ़ेद पेज हटा दिया गया */
        }
        
        iframe { 
            width: 100%; 
            height: 100%; /* पूरी स्क्रीन पर सेट */
            border: none; 
            background: #fff; /* Iframe का अपना बैकग्राउंड */
        }

        /* --- FOOTER --- */
        .footer { 
            height: 50px; 
            background: #000; 
            border-top: 1px solid var(--primary); 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            z-index: 1500; 
            display: flex; 
            align-items: center; 
            justify-content: space-around; 
            font-size: 11px;
        }
        .live-dot {
            width: 8px; height: 8px;
            background: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <div id="mainContent">
        <header class="header">
            <h1>VIKASH SAHU</h1>
            <p style="font-size:9px; color:var(--primary); letter-spacing: 2px;">V-INTEL SECURE NODE</p>
        </header>

        <div class="disclaimer-bar">
            <div class="marquee-text">
                ⚠️ **अस्वीकरण (DISCLAIMER):** यह सिस्टम केवल शैक्षिक उद्देश्यों के लिए है। 🛡️ डेटा का दुरुपयोग कानूनन अपराध है। 🚫 हम किसी भी अवैध गतिविधि का समर्थन नहीं करते। ⚖️ **USE AT YOUR OWN RISK!** 🛡️ 𝐯𝐢𝐤𝐚𝐬𝐡 𝐛𝐡𝐚𝐢 🛡️
            </div>
        </div>
        
        <div class="viewport">
            <iframe src="https://goutamhx.github.io/TrueCallCheck-Web/"></iframe>
        </div>

        <footer class="footer">
            <span><span class="live-dot"></span>SYS_ONLINE</span>
            <span id="clock" style="color: var(--primary); font-weight: bold;">00:00:00</span>
            <span>𝗗𝗘𝗩: <span style="color:var(--primary)">𝐯𝐢𝐤𝐚𝐬𝐡 𝐛𝐡𝐚𝐢</span></span>
        </footer>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
