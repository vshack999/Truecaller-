<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Control</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000; /* Dark Background */
        }

        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            position: absolute;
            z-index: 10;
            background: radial-gradient(circle, #2c3e50, #000000);
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input {
            padding: 12px;
            width: 80%;
            border-radius: 5px;
            border: none;
            margin: 20px 0;
            font-size: 16px;
            text-align: center;
        }

        button {
            padding: 12px 30px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background-color: #c0392b; }
        button:disabled { background-color: #555; cursor: not-allowed; }

        #error-msg {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 10px;
        }

        iframe {
            display: none;
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Security Check</h2>
            <p id="instruction">Enter PIN to proceed (Max 2 attempts)</p>
            <input type="password" id="passInput" placeholder="Enter PIN">
            <br>
            <button id="unlockBtn" onclick="checkPassword()">Unlock Website</button>
            <p id="error-msg"></p>
        </div>
    </div>

    <iframe id="web-frame" src=""></iframe>

    <script>
        let attempts = 0; // Attempt count karne ke liye

        function checkPassword() {
            const pinInput = document.getElementById("passInput");
            const errorMsg = document.getElementById("error-msg");
            const unlockBtn = document.getElementById("unlockBtn");
            
            // Yahan apna PIN change karein
            const correctPin = "9988"; 

            if (pinInput.value === correctPin) {
                // Sahi PIN hone par
                document.getElementById("login-screen").style.display = "none";
                const frame = document.getElementById("web-frame");
                frame.style.display = "block";
                frame.src = "https://goutamhx.github.io/TrueCallCheck-Web";
            } else {
                // Galat PIN hone par
                attempts++;
                let remaining = 2 - attempts;

                if (attempts >= 2) {
                    errorMsg.innerText = "Access Blocked! Aapne 2 baar galat PIN dala hai.";
                    pinInput.disabled = true;
                    unlockBtn.disabled = true;
                    pinInput.value = "";
                } else {
                    errorMsg.innerText = "Galat PIN! Sirf " + remaining + " mauka bacha hai.";
                    pinInput.value = "";
                }
            }
        }

        // Enter key support
        document.getElementById("passInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter" && !this.disabled) checkPassword();
        });
    </script>

</body>
</html>
