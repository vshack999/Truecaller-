<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIKASH SAHU | PRO TERMINAL</title>
    <style>
        :root {
            --primary: #00f2fe; /* Cyan */
            --secondary: #4facfe; /* Blue */
            --bg-start: #0f2027;
            --bg-mid: #203a43;
            --bg-end: #2c5364;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* BIGGER PRO HEADER */
        .header {
            height: 110px; /* Size bada kar diya */
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 4px solid var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed; top: 0; width: 100%; z-index: 1000;
            box-shadow: 0 5px 30px rgba(0, 242, 254, 0.6);
        }

        .header h1 { 
            color: var(--primary); 
            font-size: 36px; /* Bada font size */
            letter-spacing: 10px; 
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--primary), 0 0 30px var(--secondary);
            font-weight: 900;
        }

        .header p {
            color: #fff;
            font-size: 11px;
            letter-spacing: 4px;
            margin-top: 5px;
            opacity: 0.8;
            font-family: monospace;
        }

        /* Viewport */
        .viewport {
            position: absolute; top: 110px; bottom: 60px; width: 100%;
            overflow-y: auto; overflow-x: hidden;
            background: #fff;
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            width: 100%;
            height: 2200px;
            border: none;
            position: absolute;
            top: -340px; /* Search box alignment */
            left: 0;
            z-index: 1;
        }

        /* White Masks */
        .top-mask {
            position: sticky; top: 0; width: 100%; height: 105px;
            background: #fff; z-index: 10;
        }

        .bottom-mask {
            position: absolute; 
            top: 1180px; 
            width: 100%; 
            height: 1500px; 
            background: #fff; 
            z-index: 10;
        }

        /* PRO FOOTER */
        .footer {
            height: 60px; /* Bada size */
            background: rgba(0, 0, 0, 0.95);
            border-top: 2px solid var(--primary);
            position: fixed; bottom: 0; width: 100%; z-index: 1000;
            display: flex; align-items: center; justify-content: space-around;
            color: var(--primary);
            font-size: 13px;
            font-family: monospace;
            padding: 0 10px;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            border: 1px solid var(--primary);
            padding: 4px 8px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .footer a:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 10px var(--primary);
        }

        .scan-anim {
            color: #fff;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>VIKASH SAHU</h1>
        <p>SYSTEM ACCESS: LEVEL_ADMIN</p>
    </div>

    <div class="viewport">
        <div class="top-mask"></div>
        
        <iframe src="https://goutamhx.github.io/TrueCallCheck-Web/"></iframe>
        
        <div class="bottom-mask"></div>
    </div>

    <div class="footer">
        <span class="scan-anim">ONLINE_DATA</span>
        <span id="clock" style="font-weight: bold;"></span>
        <span>DEV: <a href="https://t.me/Vikashsahu07" target="_blank">@Vikashsahu07</a></span>
    </div>

    <script>
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>

</body>
</html>
